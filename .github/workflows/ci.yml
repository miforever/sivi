name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend — lint + test + Docker build
  # ---------------------------------------------------------------------------
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: sivi_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: sivi_test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/2
      - run: uv run pytest tests/ src/apps/ -x --tb=short
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: sivi_test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/2

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sivi-api:ci ./backend

  # ---------------------------------------------------------------------------
  # Telegram Bot — lint + Docker build
  # ---------------------------------------------------------------------------
  bot-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  bot-build:
    runs-on: ubuntu-latest
    needs: bot-lint
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t sivi-bot:ci ./telegram-bot

  # ---------------------------------------------------------------------------
  # Frontend — build landing + admin
  # ---------------------------------------------------------------------------
  landing-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/landing/package-lock.json
      - run: npm ci
      - run: npm run build

  admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.sivi.uz/api/v1

  # ---------------------------------------------------------------------------
  # Docker Compose validation
  # ---------------------------------------------------------------------------
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env files for validation
        run: |
          cp backend/env.example backend/.env
          cp telegram-bot/env.example telegram-bot/.env
      - run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml config --quiet
