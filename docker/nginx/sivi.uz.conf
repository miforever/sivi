server {
    listen 80;
    server_name sivi.uz www.sivi.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://sivi.uz$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.sivi.uz;

    ssl_certificate /etc/letsencrypt/live/sivi.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivi.uz/privkey.pem;

    return 301 https://sivi.uz$request_uri;
}

server {
    listen 443 ssl;
    server_name sivi.uz;

    ssl_certificate /etc/letsencrypt/live/sivi.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sivi.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_landing landing:3000;

    location / {
        proxy_pass http://$upstream_landing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
